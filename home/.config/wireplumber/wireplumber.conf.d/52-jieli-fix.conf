monitor.alsa.rules = [
  {
    matches = [
      {
      "node.name": "alsa_output.usb-Jieli_Technology_USB_Composite_Device_4250323139323813-00.analog-stereo"
      }
    ]
    actions = {
      update-props = {
        # 1. Force 48kHz (Safe Mode)
        # 96kHz @ 24-bit is likely to drift. 48kHz is native.
        "audio.rate" = 48000

        # 2. Try forcing 16-bit again (with standard ALSA syntax)
        "audio.format" = "S16_LE"

        # 3. CRITICAL: Lock the Buffer Size
        # This forces the USB packets to be regular, preventing drift.
        "api.alsa.period-size" = 1024
        "api.alsa.headroom" = 1024

        # 4. Disable Sleep
        "session.suspend-timeout-seconds" = 0
      }
    }
  }
]
