icon = "https://cdn.discordapp.com/app-icons/919597629531381770/e07a08a3aa9c6c63d391f7d412d45492.png"
show_icon = true
# allow_streaming = true
# override_activity_type = "watching"
# status_display_type = "details"
ignore = true

